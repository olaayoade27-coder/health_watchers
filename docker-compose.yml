services:
  mongodb:
    image: mongo:7.0-alpine
    container_name: health-watchers-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: health_watchers
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - health-watchers-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: health-watchers-api
    environment:
      NODE_ENV: production
      API_PORT: 3001
      MONGO_URI: mongodb://admin:password123@mongodb:27017/health_watchers?authSource=admin
      JWT_SECRET: your-secret-key-change-in-production
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STELLAR_SECRET_KEY: ${STELLAR_SECRET_KEY:-}
      STELLAR_NETWORK: testnet
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - health-watchers-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  stellar-service:
    build:
      context: .
      dockerfile: apps/stellar-service/Dockerfile
    container_name: health-watchers-stellar-service
    environment:
      NODE_ENV: production
      STELLAR_SERVICE_PORT: 3002
      STELLAR_NETWORK: testnet
      STELLAR_SECRET_KEY: ${STELLAR_SECRET_KEY:-}
    ports:
      - "3002:3002"
    networks:
      - health-watchers-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: health-watchers-web
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      # Update with actual API URL if needed for client-side
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - health-watchers-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  health-watchers-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
